# example-fallback mode — schema gate may generate OpenAPI from documented examples
gate: GO (example-fallback)
strictness: example-fallback
dialect: OpenAPI 3.x
fixture_root: fixture-input
generation_test: true

report_path: docs/openapi-readiness-report.md
required_outputs:
  - schema/openapi.yaml

must_contain_in_report:
  - "Schema gate: **GO (example-fallback)**"
  - "Strictness: example-fallback"
  - "User selected option 2"
  - "inferred-from-example"

must_not_contain_in_report:
  - "Schema gate: **NO-GO**"

must_contain_in_openapi:
  - "x-readiness: example-fallback"
  - "x-inferred-from: example"
  - "code:"
  - "data:"
  - "time:"
  - "open:"

fixture_input:
  fr_ohlc_histroy: source/raw/fr-ohlc-histroy.md

fixture_markers:
  fr_ohlc_histroy:
    - "/api/futures/funding-rate/history"
    - "fr-ohlc-histroy"
